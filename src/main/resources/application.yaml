server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: asset-performance-platform
  
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/asset_performance}
      auto-index-creation: true
    
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-please-make-it-long-enough}
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days

# Cache Configuration
cache:
  default-ttl: 300 # 5 minutes in seconds
  analytics-ttl: 600 # 10 minutes for analytics
  asset-stats-ttl: 60 # 1 minute for asset stats

# WebSocket Configuration
websocket:
  max-connections: 1000
  heartbeat-interval: 30000 # 30 seconds

# Rate Limiting
rate-limit:
  enabled: true
  requests-per-minute: 100
  requests-per-hour: 1000

# Background Tasks
tasks:
  aggregation-cron: "0 */5 * * * *" # Every 5 minutes
  report-generation-cron: "0 0 * * * *" # Every hour

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    root: INFO
    com.astha.performance: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.data.redis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log